name: NeoRAG CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic pydantic-settings \
                      python-jose passlib httpx pytest pytest-asyncio \
                      loguru python-multipart

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t neorag:latest .

      - name: Verify image
        run: docker run --rm neorag:latest python -c "from app.main import app; print('✅ App imports OK')"
